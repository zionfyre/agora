name: Deploy Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          FUNCTIONS=$(ls -d supabase/functions/*/ | xargs -I {} basename {})
          for fn in $FUNCTIONS; do
            # Skip _shared — it's not a function, it's a shared module
            if [ "$fn" = "_shared" ]; then continue; fi
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          done
          echo "All edge functions deployed."
